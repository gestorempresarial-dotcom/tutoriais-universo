async function popular() {
  const btn = document.getElementById("btn");
  const log = document.getElementById("log");
  btn.disabled = true;
  btn.textContent = "⏳ Criando tutoriais...";
  log.innerHTML = "";

  let ok = 0, erro = 0;
  for (const t of TUTORIAIS) {
    try {
      await db.collection("tutoriais").add({
        ...t,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      ok++;
      log.innerHTML += `<div class="ok">✓ ${t.numero} — ${t.titulo}</div>`;
      log.scrollTop = log.scrollHeight;
    } catch(e) {
      erro++;
      log.innerHTML += `<div class="err">✗ ${t.titulo}: ${e.message}</div>`;
    }
  }

  btn.textContent = `✅ Concluído! ${ok} criados${erro ? `, ${erro} erros` : ""}`;
  log.innerHTML += `<div style="margin-top:0.5rem;font-weight:700;color:#1B2D6B">
    Pronto! Feche esta página e acesse o sistema.
  </div>`;
}
